<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#EFE9DD"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(86,80,69,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Brand mark -->
  <text x="96" y="200" font-family="monospace" font-size="13" letter-spacing="2" fill="#B8860B" text-anchor="start">PRICING ★ STAR</text>

  <!-- Headline -->
  <text x="96" y="300" font-family="Georgia, serif" font-size="64" font-weight="300" font-style="italic" fill="#161310" text-anchor="start">Where pharma pricing</text>
  <text x="96" y="378" font-family="Georgia, serif" font-size="64" font-weight="300" font-style="italic" fill="#161310" text-anchor="start">meets the world.</text>

  <!-- Caption -->
  <text x="96" y="490" font-family="monospace" font-size="13" fill="#8C8473" text-anchor="start">▸ MFN. IRP. Reference pricing. Across 47 markets.</text>

  <!-- Bottom rule -->
  <line x1="96" y1="560" x2="480" y2="560" stroke="#D5CCB6" stroke-width="1"/>
  <text x="96" y="590" font-family="monospace" font-size="11" fill="#8C8473">pricingstar.io</text>
</svg>
